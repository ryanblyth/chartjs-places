<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Places Chart - US Census Places Explorer</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Places Chart</h1>
      <div id="vintage-info" class="vintage-info"></div>
    </header>

    <main>
      <section class="search-section">
        <div class="search-container">
          <input 
            type="text" 
            id="search-input" 
            placeholder="Search for a place (e.g., Loveland, CO)"
            autocomplete="off"
            disabled
          >
          <div id="search-results" class="search-results"></div>
        </div>
        <div id="error-message" class="error-message" style="display: none;"></div>
      </section>

      <section class="place-section" id="place-section" style="display: none;">
        <div class="place-header">
          <h2 id="place-name"></h2>
        </div>
        
        <div class="kpi-section">
          <div class="kpi-card">
            <div class="kpi-label">Population Density</div>
            <div class="kpi-value" id="kpi-value">—</div>
            <div class="kpi-unit">per sq mi</div>
          </div>
        </div>

        <div class="demographics-section" id="demographics-section">
          <h3>Demographics by number</h3>
          <ul class="demographics-list" id="demographics-list"></ul>
        </div>

        <div class="chart-container demographics-percent-chart-container">
          <canvas id="demographics-percent-chart"></canvas>
        </div>

        <div class="chart-container race-doughnut-chart-container">
          <canvas id="race-doughnut-chart"></canvas>
        </div>

        <div class="chart-container commute-percent-chart-container">
          <canvas id="commute-percent-chart"></canvas>
        </div>

        <div class="chart-container commute-doughnut-chart-container">
          <canvas id="commute-doughnut-chart"></canvas>
        </div>

        <div class="charts-section">
          <div class="chart-container">
            <canvas id="chart1"></canvas>
          </div>
          <div class="chart-container">
            <canvas id="chart2"></canvas>
          </div>
        </div>

        <div id="no-attrs-message" class="no-attrs-message" style="display: none;">
          No attributes found for this place.
        </div>
      </section>

      <section class="colorado-section" id="colorado-section">
        <div class="colorado-header">
          <h2>Top 10 Colorado Cities by Population</h2>
          <button id="load-colorado-btn" class="load-btn">Load Chart</button>
        </div>
        <div class="chart-container colorado-chart-container">
          <canvas id="colorado-chart"></canvas>
        </div>
        <div id="colorado-loading" class="loading-message" style="display: none;">
          Loading Colorado cities data...
        </div>
        <div id="colorado-error" class="error-message" style="display: none;"></div>
      </section>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
